<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>GeoVerse 示例查看器</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
  <style>html, body, #map { margin: 0; height: 100%; }</style>
</head>
<body>
<div id="map"></div>
<script>
  // 假设 geoverse 运行在同源 8080 端口；跨域时改为完整地址。
  const base = location.origin.includes('8080') ? location.origin : 'http://localhost:8080';
  const map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        countries: { type: 'vector', url: base + '/tiles/countries.json' },
        places: { type: 'vector', url: base + '/tiles/places.json' },
        cities: { type: 'vector', url: base + '/tiles/cities.json' }
      },
      layers: [
        { id: 'bg', type: 'background', paint: { 'background-color': '#aad3df' } },
        {
          id: 'countries-fill', type: 'fill', source: 'countries', 'source-layer': 'countries',
          paint: { 'fill-color': '#f0ede5', 'fill-outline-color': '#b3a98c' }
        },
        {
          id: 'places', type: 'circle', source: 'places', 'source-layer': 'places',
          paint: { 'circle-radius': 3, 'circle-color': '#7f8c8d' }
        },
        {
          id: 'cities', type: 'circle', source: 'cities', 'source-layer': 'cities',
          paint: { 'circle-radius': 6, 'circle-color': '#c0392b', 'circle-stroke-width': 1.5, 'circle-stroke-color': '#fff' }
        }
      ]
    },
    center: [110, 33],
    zoom: 3
  });
  map.addControl(new maplibregl.NavigationControl());
  map.on('click', 'cities', e => {
    const p = e.features[0].properties;
    new maplibregl.Popup().setLngLat(e.lngLat)
      .setHTML(`<b>${p.name}</b><br>人口: ${Number(p.population).toLocaleString()}`)
      .addTo(map);
  });
</script>
</body>
</html>
